<section id="planner" class="container" style="scroll-margin-top:80px">
  <div class="card" style="margin-top:18px">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="font-weight:800;font-size:18px">Timings & Price</div>
      <div style="color:var(--muted);font-size:13px">Live structure — data from timetable & fare JSON</div>
    </div>

    <!-- Selectors -->
    <div style="display:grid;grid-template-columns:1fr auto 1fr auto;gap:10px;margin-top:12px">
      <select id="fromSelect" class="btn" style="width:100%"></select>
      <button id="swapBtn" class="btn" title="Swap">⇅</button>
      <select id="toSelect" class="btn" style="width:100%"></select>
      <a href="#map-section" class="btn">Back to map</a>
    </div>

    <!-- Direction chips (auto from topology) -->
    <div id="directionRow" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px"></div>

    <!-- Timing & price cards -->
    <div style="display:grid;grid-template-columns:1.2fr .8fr;gap:12px;margin-top:12px">
      <div class="card" style="background:#0e1520">
        <div style="font-weight:700;margin-bottom:8px">Timings</div>
        <div id="timingSummary" style="color:var(--muted);font-size:14px;margin-bottom:10px"></div>

        <div id="timingTables" style="display:grid;gap:10px">
          <!-- Filled by JS -->
        </div>
      </div>

      <div class="card" style="background:#0e1520">
        <div style="font-weight:700;margin-bottom:8px">Price & Route</div>
        <div id="priceSummary" style="color:var(--muted);font-size:14px;margin-bottom:8px">
          Select both From and To to see fare.
        </div>
        <div id="routeBreakdown" style="font-size:13px;color:var(--muted)"></div>
      </div>
    </div>
  </div>
</section>


<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bangalore Metro — V1 (Markers on every station)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body { height:100%; margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    #topbar { position: fixed; top:0; left:0; right:0; background:#111; color:#fff; padding:10px 12px; z-index:1000; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    #map { position:absolute; top:56px; bottom:0; left:0; right:0; }
    .pill { background:#1f2937; border-radius:999px; padding:6px 10px; display:flex; align-items:center; gap:8px; font-size:14px; }
    .legend { background:#fff; padding:8px 10px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .legend h4 { margin:0 0 6px 0; font-size:14px; }
    .legend .item { display:flex; align-items:center; gap:8px; margin:4px 0; }
    .legend .swatch { width:14px; height:14px; border-radius:3px; display:inline-block; }
    .toggle { cursor:pointer; }
    .leaflet-tooltip.station-tooltip {
  background:#fff;
  color:#111;
  border-radius:8px;
  border:1px solid #ccc;
  padding:6px 8px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
      }
    .leaflet-tooltip.station-tooltip span:hover {
  text-decoration:underline;
  }

  </style>
</head>
<body>
  <div id="topbar">
    <div style="font-weight:600;">BangaloreMetroMap.com — V1</div>
    <label class="pill toggle">
      <input type="checkbox" id="fullNetworkToggle" checked>
      <span>Show full network (incl. upcoming)</span>
    </label>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([12.9716, 77.5946], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution:'© OpenStreetMap contributors' }).addTo(map);

    const lineLayers = L.layerGroup().addTo(map);
    const stationLayers = L.layerGroup().addTo(map);

    let STATIONS=[], LINES=[];  // from JSON
    let showFull = true;

    const toggle = document.getElementById('fullNetworkToggle');
    toggle.addEventListener('change', () => { showFull = toggle.checked; render(); });

    async function loadJSON(path) { const r = await fetch(path); return r.json(); }
    function getStationById(id){ return STATIONS.find(s=>s.id===id); }

    function render() {
  lineLayers.clearLayers();
  stationLayers.clearLayers();

  // lines (drawn first, so stations sit above)
  LINES.filter(l => l.operational === true).forEach(line => {
    const coords = [];
    for (const id of (line.stations || [])) {
      const s = STATIONS_BY_ID[id];
      if (s && s.operational === true) coords.push([s.lat, s.lng]);
    }
    if (coords.length >= 2) {
      L.polyline(coords, { 
        color: line.color || '#555', 
        weight: 5, 
        opacity: 0.95 
      }).addTo(lineLayers);
    }
  });

  // stations (drawn after lines, so hover always works)
  STATIONS.forEach(s => {
    if (s.operational !== true) return;

    const marker = L.circleMarker([s.lat, s.lng], {
      radius: 6,
      color:'#0b0b0b',
      weight:1,
      fillColor:'#ffffff',
      fillOpacity:1,
      pane: 'markerPane' // ensure it's in front
    });

    // Tooltip (styled action menu)
    marker.bindTooltip(
      `
      <div style="min-width:180px; padding:4px 0;">
        <div style="font-weight:600; margin-bottom:6px;">${s.name}</div>
        <div style="display:flex; gap:10px; font-size:13px; font-weight:500;">
          <span style="cursor:pointer; color:#4f46e5;">Time</span>
          <span style="cursor:pointer; color:#4f46e5;">Price</span>
          <span style="cursor:pointer; color:#4f46e5;">Info</span>
        </div>
      </div>
      `,
      { 
        direction:'top', 
        offset:[0,-8], 
        opacity:0.95, 
        sticky:true,
        className: "station-tooltip"
      }
    );

    marker.addTo(stationLayers);
  });
}


    Promise.all([loadJSON('data/stations.json'), loadJSON('data/lines.json')]).then(([stations, lines]) => {
      STATIONS = stations;
      LINES = lines;
      render();
    });

    // Legend
    const legend = L.control({position:'bottomleft'});
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h4>Lines</h4>
        <div class="item"><span class="swatch" style="background:#7e3ff2"></span> Purple</div>
        <div class="item"><span class="swatch" style="background:#1db954"></span> Green</div>
        <div class="item"><span class="swatch" style="background:#edc21e"></span> Yellow</div>
        <div class="item"><span class="swatch" style="background:#ff5ca2"></span> Pink (upcoming)</div>
        <div class="item"><span class="swatch" style="background:#43a5ff"></span> Blue (upcoming)</div>
      `;
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bengaluru Metro — Map, routes & stations</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    /* Page-specific tweaks for minimal clean look */
    .hero {
      margin: 20px auto 14px;
      display: grid;
      gap: 6px;
    }
    .hero .headline {
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .hero .sub {
      color: var(--muted);
      font-size: 15px;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 8px 0 0;
    }

    /* Inline planner styles (can be moved to assets/styles.css later) */
    .planner-section { padding: 24px 16px; background: #f9fafb; border-top: 1px solid #eee; margin-top: 18px; }
    .planner-section h2 { margin: 0 0 12px; font-size: 20px; }
    .planner-controls { display: grid; gap: 12px; grid-template-columns: 1fr; max-width: 760px; }
    .planner-row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
    .planner-select, .plan-btn { padding: 10px 12px; font-size: 16px; }
    .plan-btn { border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; width: fit-content; }
    .towards-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .towards-btn { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 8px; }
    .towards-btn.active { border-color: #111827; }
    .planner-results { margin-top: 16px; background: white; border: 1px solid #eee; border-radius: 12px; padding: 16px; max-width: 760px; }
    .planner-results .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
    .planner-results .row:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <!-- Topbar (empty spacer, no brand/links) -->
  <header class="topbar">
    <div class="container" style="padding:10px 16px"></div>
  </header>

  <main class="container">
    <!-- Simple title + subtitle -->
    <section class="hero">
      <div class="headline">Bengaluru's Namma Metro, at a glance.</div>
      <div class="sub">A clear, up-to-date map and timings of the operational network — Purple, Green, and Yellow lines with all stations.</div>
    </section>

    <!-- Map -->
    <section id="map-section" class="map-wrap">
      <div id="map"></div>
      <div class="hint">Tip: select your starting station on the map to see timings and price.</div>
    </section>

    <!-- Timings & Price (Inline Planner) -->
    <section id="planner" class="planner-section">
      <h2>Timings & Price</h2>

      <div class="planner-controls">
        <div class="planner-row">
          <div>
            <label for="fromSelect">From</label>
            <select id="fromSelect" class="planner-select"></select>
          </div>
          <div>
            <label for="toSelect">To (optional)</label>
            <select id="toSelect" class="planner-select"></select>
          </div>
        </div>

        <div>
          <div style="font-weight:600; margin-bottom:6px;">Direction (Towards)</div>
          <div id="towardsContainer" class="towards-container">
            <!-- Buttons render here -->
          </div>
        </div>

        <button id="planBtn" class="plan-btn">Plan Journey</button>
      </div>

      <div id="plannerResults" class="planner-results">
        <!-- Fare, time, transfers, first/last train render here -->
      </div>
    </section>

    <!-- Future panels still mount here -->
    <section id="feature-target"></section>
  </main>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { bootstrap } from "./src/app.js";
    bootstrap(); // initializes the map
  </script>

  <!-- Planner init (kept separate from map code) -->
  <script type="module">
    import { initPlanner, plannerAPI } from "./src/planner.js";

    document.addEventListener('DOMContentLoaded', async () => {
      await initPlanner({
        fromSelect: '#fromSelect',
        toSelect: '#toSelect',
        towardsContainer: '#towardsContainer',
        results: '#plannerResults',
        dataRoot: './data',        // expects stations.json, lines.json, runtime.json, and fares/fare.json
        scrollTarget: '#planner'
      });

      // Expose minimal API so the MAP can set stations on click
      window.MetroPlanner = plannerAPI;
    });

    // Optional: if your map code dispatches a custom event on station click,
    // you can wire it like this (safe no-op if never fired):
    window.addEventListener('metro:stationClick', (e) => {
      const id = e.detail?.id;
      if (id && window.MetroPlanner?.setFrom) {
        window.MetroPlanner.setFrom(id, { scroll: true });
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bengaluru Metro — Map, routes & stations</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="assets/styles.css"/>
  <style>
    /* Page-specific tweaks for minimal clean look */
    .hero {
      margin: 20px auto 14px;
      display: grid;
      gap: 6px;
    }
    .hero .headline {
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .hero .sub {
      color: var(--muted);
      font-size: 15px;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <!-- Topbar (empty spacer, no brand/links) -->
  <header class="topbar">
    <div class="container" style="padding:10px 16px"></div>
  </header>

  <main class="container">
    <!-- Simple title + subtitle -->
    <section class="hero">
      <div class="headline">Bengaluru's Namma Metro, at a glance.</div>
      <div class="sub">A clear, up-to-date map and timings of the operational network — Purple, Green, and Yellow lines with all stations.</div>
    </section>

    <!-- Map -->
    <section id="map-section" class="map-wrap">
      <div id="map"></div>
      <div class="hint">Tip: select your starting station on the map to see timings and price.</div>
    </section>

    <!-- Future panels still mount here -->
    <section id="feature-target"></section>
  </main>


  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { bootstrap } from "./src/app.js";
    bootstrap();
  </script>
</body>
</html>
